<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/app/" />
    <meta name="theme-color" content="#b31217" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
    <title>Alpha Assistant</title>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <img src="logo-alpha.svg" alt="Alpha logo" class="logo" />
        <div class="title-wrap">
          <h1>Alpha</h1>
          <p class="subtitle">Your red-line assistant for school, life, and focus</p>
        </div>
        <p id="statusLine" class="status">Checking AI status...</p>
      </header>

      <section id="chatFeed" class="chat-feed" aria-live="polite">
        <article class="bubble alpha">
          Say "Alpha" or type your question. You can also add a photo from camera with the + button.
        </article>
      </section>

      <footer class="composer-wrap">
        <div id="plusMenu" class="plus-menu hidden">
          <label for="imageInput" class="menu-item">Attach Camera/Image</label>
          <button id="speakToggle" class="menu-item" type="button">Voice Replies: On</button>
        </div>

        <div class="composer">
          <button id="plusBtn" class="icon-btn" type="button" aria-label="More options">+</button>
          <textarea id="chatInput" rows="1" placeholder="Message Alpha..." autocomplete="off"></textarea>
          <button id="actionBtn" class="action-btn" type="button" aria-label="Send or speak">Mic</button>
          <input id="imageInput" type="file" accept="image/*" capture="environment" hidden />
        </div>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
